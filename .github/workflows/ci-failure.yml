name: Failing Tests CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Failing Tests Only
      run: mvn clean test -Dtest=LoginTest#testLoginFailure

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: failure-testng-report
        path: target/surefire-reports/
